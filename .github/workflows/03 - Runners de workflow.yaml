name: Runners de workflow
on:
  push:
jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - name: "Mostrar SO"
        run: |
          echo "Este trabajo se ejecuta en un Runner de Ubuntu"
          echo $RUNNER_OS

  windows-echo:
    runs-on: windows-latest
    steps:
      - name: "Mostrar SO"
        run: |
          echo "Este trabajo se ejecuta en un Runner de Windows"
          echo $RUNNER_OS

  mac-echo:
    runs-on: macos-latest
    steps:
      - name: "Mostrar SO"
        run: |
          echo "Este trabajo se ejecuta en un Runner de Macos"
          echo $RUNNER_OS