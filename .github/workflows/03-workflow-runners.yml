name: 03 - Runners de workflow
on: 
    push:
jobs:
    ubuntu-echo:
        runs-on: ubuntu-latest
        steps:
            - name: 'Mostrar SO'
              shell: bash
              run: | 
                echo 'Este trabajo se ejecuta en un Runner de Ubuntu'
                echo 'Sistema Operativo:' $RUNNER_OS
    windows-echo:
        runs-on: Windows-latest
        steps:
            - name: 'Mostrar SO'
              shell: bash
              run: | 
                echo 'Este trabajo se ejecuta en un Runner de Windows'
                echo 'Sistema Operativo:' $RUNNER_OS
    mac-echo:
        runs-on: macos-latest
        steps:
            - name: 'Mostrar SO'
              run: | 
                echo 'Este trabajo se ejecuta en un Runner de MacOS'
                echo 'Sistema Operativo:' $RUNNER_OS

