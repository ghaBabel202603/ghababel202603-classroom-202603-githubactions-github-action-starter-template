name: 04 - Uso de Actions
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install dependencies
        run: |
          cd my-app
          npm ci
      - name: Run Unit Tests
        run: |
          cd my-app
          npm test
